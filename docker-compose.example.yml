# PageKeeper - Example Docker Compose Configuration
#
# All settings are configured via the web dashboard at http://localhost:4477/settings
# No environment variables are required beyond TZ.
#
# See README.md for detailed configuration instructions.

services:
  pagekeeper:
    build: .
    # args:
    #   # Set to "true" to download NVIDIA CUDA libraries (adds ~800MB to image)
    #   INSTALL_GPU: "false"
    container_name: pagekeeper
    restart: unless-stopped

    environment:
      - TZ=America/New_York
      # - LOG_LEVEL=INFO
      # - KOSYNC_PORT=5758 # Enable Split-Port Mode (Safe for Internet Exposure)

    volumes:
      # === REQUIRED ===
      - ./data:/data                    # App data (database, cache)
      # === OPTIONAL ===
      # - /path/to/ebooks:/books:ro     # Only needed for cross-format sync without Booklore/CWA
      # === STORYTELLER (OPTIONAL) ===
      # - /path/to/storyteller/processing:/storyteller-data:ro   # Storyteller's processing dir (for word-level alignment)
      # - /path/to/storyteller/import:/storyteller-import:rw     # Storyteller's import dir (for submitting books)

    ports:
      - "8080:4477"   # Admin Dashboard (Keep Internal/LAN)
      # - "5758:5758" # Sync Protocol (Enable if KOSync Port is set)

    networks:
      - your-network
    # ============================================
    # GPU SUPPORT (OPTIONAL)
    # ============================================
    # Uncomment below to enable NVIDIA GPU acceleration for Whisper.
    # Requires: docker with nvidia-container-toolkit installed.
    # See: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  your-network:
    external: true
