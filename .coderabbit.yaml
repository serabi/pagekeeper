language: en-US
tone_instructions: "Be concise and direct. Focus on bugs, security, and logic errors over style."
early_access: false
enable_free_tier: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: false
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  poem: true
  in_progress_fortune: true
  suggested_labels: false
  suggested_reviewers: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: "Use the [Type] Description format. Types: Feature, Fix, UI, Refactor, Docs, Test."

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev

  path_filters:
    - "!docs/**"
    - "!**/*.md"

  path_instructions:
    - path: "src/sync_clients/**"
      instructions: |
        Sync clients must implement the SyncClient interface from sync_client_interface.py.
        Check that all public methods match the interface contract.
        Watch for write-tracker usage to prevent feedback loops after pushing progress.
    - path: "src/blueprints/**"
      instructions: |
        Flask blueprints access shared state via flask.current_app.config — never import app directly.
        No print() statements — use logging.getLogger(__name__) only.
    - path: "tests/**"
      instructions: |
        Tests use the MockContainer pattern (plain class matching DI container attributes).
        Fixtures should be in conftest.py. Prefer pytest.raises for exception testing.
    - path: "alembic/versions/**"
      instructions: |
        Migration files should include both upgrade() and downgrade() functions.
        Check for potential data loss in destructive operations.

  tools:
    ruff:
      enabled: true
    pylint:
      enabled: false
    semgrep:
      enabled: true
    shellcheck:
      enabled: true
    eslint:
      enabled: false
    biome:
      enabled: false
    markdownlint:
      enabled: false
    hadolint:
      enabled: true
    yamllint:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
