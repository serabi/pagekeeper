name: Test

on:
  push:
    branches: [main, dev, "cleanup/**"]
  pull_request:
    branches: [main, dev, "cleanup/**"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pytest in the test container
        run: docker compose -f docker-compose.test.yml run --rm test tests/
