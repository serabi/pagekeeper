<header class="top-nav">
    <div class="nav-brand">
        <a href="/" class="brand-link">
            <img src="/static/icon.png" alt="Book Stitch" class="app-icon" width="36" height="36">
            <h1>Book Stitch</h1>
        </a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-controls="nav-menu" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>
    <nav class="nav-menu" id="nav-menu">
        <div class="library-links">
            {% if abs_server %}
            <a href="{{ abs_server }}" class="nav-icon-link" target="_blank" rel="noopener noreferrer"
                title="Audiobookshelf">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
            </a>
            {% endif %}

            {% if booklore_server and (get_bool('BOOKLORE_ENABLED') or get_val('BOOKLORE_ENABLED') == '') %}
            <a href="{{ booklore_server }}" class="nav-icon-link" target="_blank" rel="noopener noreferrer"
                title="Ebook Library">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
            </a>
            {% endif %}

        </div>
        <div class="nav-actions">
            <a href="/settings" class="nav-link">Settings</a>
            <a href="/logs" class="nav-link">Logs</a>
            <a href="/batch-match" class="nav-link">Batch</a>
            <a href="/match" class="btn btn-primary">Add Book</a>
        </div>
    </nav>
</header>
<script>
document.getElementById('nav-toggle')?.addEventListener('click', function() {
    document.getElementById('nav-menu')?.classList.toggle('open');
    this.classList.toggle('active');
    this.setAttribute('aria-expanded', this.classList.contains('active'));
});
</script>
