<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Logs - PageKeeper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/static/icon.png">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/logs.css">
</head>

<body>
    {% include 'partials/navbar.html' %}

    <div class="container">
        <div class="page-header">
            <h1>Logs</h1>
            <p>View, filter, and monitor system logs</p>
        </div>

        <div class="r-main-tab-bar" role="tablist" aria-label="Log sections">
            <button class="r-main-tab-btn active" type="button" id="tab-app" role="tab" data-main-tab="app" aria-selected="true" aria-controls="panel-app">Application Logs</button>
            <button class="r-main-tab-btn" type="button" id="tab-hardcover" role="tab" data-main-tab="hardcover" aria-selected="false" aria-controls="panel-hardcover">Hardcover Sync</button>
        </div>

        <div class="r-main-panel" id="panel-app" data-main-panel="app" role="tabpanel" aria-labelledby="tab-app">
        <!-- Log Controls -->
        <div class="controls">
            <div class="control-group">
                <label for="logLevel">Min Log Level:</label>
                <select id="logLevel" class="input-compact">
                    <option value="DEBUG">DEBUG</option>
                    <option value="INFO" selected>INFO</option>
                    <option value="WARNING">WARNING</option>
                    <option value="ERROR">ERROR</option>
                    <option value="CRITICAL">CRITICAL</option>
                </select>
            </div>

            <div class="control-group">
                <label for="searchInput">Filter by text:</label>
                <input type="text" id="searchInput" class="search-input input-compact" placeholder="Search logs...">
            </div>

            <div class="control-group">
                <label for="linesCount">Lines to show:</label>
                <select id="linesCount" class="input-compact">
                    <option value="100">100</option>
                    <option value="500">500</option>
                    <option value="1000" selected>1000</option>
                    <option value="2500">2500</option>
                    <option value="5000">5000</option>
                </select>
            </div>

            <div class="control-group">
                <label>&nbsp;</label>
                <button id="refreshBtn" class="btn btn-primary">Refresh Logs</button>
            </div>

            <div class="control-group auto-refresh">
                <label for="autoRefresh">Auto-refresh (30s):</label>
                <input type="checkbox" id="autoRefresh">
            </div>

            <div class="control-group auto-refresh">
                <label for="liveMode">Live mode (real-time):</label>
                <input type="checkbox" id="liveMode">
            </div>
        </div>

        <!-- Log Stats -->
        <div class="log-stats">
            <span id="totalLinesStats">Total: 0 lines</span>
            <span id="displayedLinesStats">Showing: 0 lines</span>
            <span id="lastUpdated">Last updated: Never</span>
        </div>

        <!-- Log Container -->
        <div class="log-container">
            <div class="log-header">
                <h3>Log Entries</h3>
                <div>
                    <button id="scrollToTop" class="btn btn-secondary btn-sm">Top</button>
                    <button id="scrollToBottom" class="btn btn-secondary btn-sm">Bottom</button>
                </div>
            </div>
            <div id="logContent" class="log-content">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading logs...
                </div>
            </div>
            <div id="loadMore" class="load-more hidden">
                <button class="btn btn-secondary">Load More Logs</button>
            </div>
        </div>
    </div><!-- /panel-app -->

        <div class="r-main-panel" id="panel-hardcover" data-main-panel="hardcover" role="tabpanel" aria-labelledby="tab-hardcover" hidden>
            <div class="controls">
                <div class="control-group">
                    <label for="hcDirection">Direction:</label>
                    <select id="hcDirection" class="input-compact">
                        <option value="">All</option>
                        <option value="push">Push</option>
                        <option value="pull">Pull</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="hcAction">Action:</label>
                    <select id="hcAction" class="input-compact">
                        <option value="">All</option>
                        <option value="status_update">Status Update</option>
                        <option value="create_user_book">Create User Book</option>
                        <option value="adopt_user_book">Adopt User Book</option>
                        <option value="rating">Rating</option>
                        <option value="status_transition">Status Transition</option>
                        <option value="status_pull">Status Pull</option>
                        <option value="date_pull">Date Pull</option>
                        <option value="date_push">Date Push</option>
                        <option value="automatch">Automatch</option>
                        <option value="manual_match">Manual Match</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="hcSearch">Search:</label>
                    <input type="text" id="hcSearch" class="search-input input-compact" placeholder="Search by title...">
                </div>
                <div class="control-group">
                    <label>&nbsp;</label>
                    <button id="hcRefreshBtn" class="btn btn-primary">Refresh</button>
                </div>
            </div>

            <div class="log-stats">
                <span id="hcStatsLine">Showing 0 of 0 entries</span>
            </div>

            <div class="hc-log-table-wrap">
                <table class="hc-log-table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Direction</th>
                            <th>Action</th>
                            <th>Book</th>
                            <th>Detail</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="hcLogBody">
                        <tr><td colspan="6" class="hc-empty">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="hc-pagination" id="hcPagination">
                <button id="hcPrevBtn" class="btn btn-secondary btn-sm" disabled>Prev</button>
                <span id="hcPageInfo">Page 1 of 1</span>
                <button id="hcNextBtn" class="btn btn-secondary btn-sm" disabled>Next</button>
            </div>
        </div><!-- /panel-hardcover -->
    </div>

    <script>
        let autoRefreshInterval = null;
        let liveRefreshInterval = null;
        let currentOffset = 0;
        let shownLogs = new Set(); // Track shown logs by timestamp+message

        // DOM elements
        const logContent = document.getElementById('logContent');
        const logLevel = document.getElementById('logLevel');
        const searchInput = document.getElementById('searchInput');
        const linesCount = document.getElementById('linesCount');
        const autoRefresh = document.getElementById('autoRefresh');
        const liveMode = document.getElementById('liveMode');
        const refreshBtn = document.getElementById('refreshBtn');
        const totalLinesStats = document.getElementById('totalLinesStats');
        const displayedLinesStats = document.getElementById('displayedLinesStats');
        const lastUpdated = document.getElementById('lastUpdated');
        const scrollToTop = document.getElementById('scrollToTop');
        const scrollToBottom = document.getElementById('scrollToBottom');
        const loadMore = document.getElementById('loadMore');

        // Track if user is at bottom for auto-scroll
        let isAtBottom = true;
        let userScrolled = false;

        // Monitor scroll position
        logContent.addEventListener('scroll', () => {
            const isCurrentlyAtBottom = logContent.scrollTop + logContent.clientHeight >= logContent.scrollHeight - 10;
            if (!isCurrentlyAtBottom && !userScrolled) {
                userScrolled = true;
            }
            isAtBottom = isCurrentlyAtBottom;
        });

        // Fetch logs from API
        async function fetchLogs(offset = 0, append = false) {
            try {
                const params = new URLSearchParams({
                    level: logLevel.value,
                    search: searchInput.value,
                    lines: linesCount.value,
                    offset: offset
                });

                const response = await fetch(`/api/logs?${params}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to fetch logs');
                }

                displayLogs(data, append);
                updateStats(data);
                updateLastUpdated();

                return data;
            } catch (error) {
                console.error('Error fetching logs:', error);
                logContent.textContent = '';
                const line = document.createElement('div');
                line.className = 'log-line';
                const level = document.createElement('span');
                level.className = 'log-level ERROR';
                level.textContent = 'ERROR';
                const msg = document.createElement('span');
                msg.className = 'log-message';
                msg.textContent = `Failed to fetch logs: ${error.message}`;
                line.appendChild(level);
                line.appendChild(msg);
                logContent.appendChild(line);
            }
        }

        // Fetch live logs from memory
        async function fetchLiveLogs() {
            try {
                const params = new URLSearchParams({
                    level: logLevel.value,
                    search: searchInput.value,
                    count: 50
                });

                const response = await fetch(`/api/logs/live?${params}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to fetch live logs');
                }

                if (data.logs && data.logs.length > 0) {
                    // For filter changes, force show all matching logs
                    const forceShow = logContent.innerHTML.includes('Switching filter') || logContent.innerHTML.includes('Applying filter');
                    appendNewLogs(data.logs, forceShow);
                    updateLastUpdated();
                } else if (logContent.innerHTML.includes('Switching filter') || logContent.innerHTML.includes('Applying filter')) {
                    // No logs found with current filters
                    logContent.innerHTML = `
                        <div class="log-line">
                            <span class="log-level INFO">INFO</span>
                            <span class="log-message">No logs found matching current filters</span>
                        </div>
                    `;
                }

                return data;
            } catch (error) {
                console.error('Error fetching live logs:', error);
            }
        }

        // Append new logs to existing content
        function appendNewLogs(logs, forceShow = false) {
            if (!logs || logs.length === 0) {
                // If no logs and we're in a loading state, show no logs message
                if (logContent.innerHTML.includes('Switching filter') || logContent.innerHTML.includes('Applying filter')) {
                    logContent.innerHTML = `
                        <div class="log-line">
                            <span class="log-level INFO">INFO</span>
                            <span class="log-message">No logs found matching current filters</span>
                        </div>
                    `;
                }
                return;
            }

            const scrollToBottomAfter = isAtBottom;

            // Clear loading message and reset tracking if present
            if (logContent.innerHTML.includes('Switching filter') || logContent.innerHTML.includes('Applying filter')) {
                logContent.innerHTML = '';
                shownLogs.clear(); // Clear tracking when filters change
                forceShow = true; // Show all logs when clearing filter
            }

            logs.forEach(log => {
                // Create unique identifier for this log
                const logId = `${log.timestamp}|${log.message}`;

                // Check if we've already shown this exact log, or if we're forcing show (filter change)
                if (forceShow || !shownLogs.has(logId)) {
                    const logLine = document.createElement('div');
                    logLine.className = 'log-line';

                    logLine.innerHTML = `
                        <span class="log-timestamp">${escapeHtml(log.timestamp)}</span>
                        <span class="log-level ${log.level}">${log.level}</span>
                        <span class="log-module">${escapeHtml(log.module || 'unknown')}</span>
                        <span class="log-message">${escapeHtml(log.message)}</span>
                    `;

                    // Add visual indicator for new logs (only if not forcing show)
                    if (!forceShow) {
                        logLine.style.background = 'rgba(124, 58, 237, 0.1)';
                        setTimeout(() => {
                            logLine.style.background = '';
                        }, 2000);
                    }

                    logContent.appendChild(logLine);

                    // Mark this log as shown
                    shownLogs.add(logId);
                }
            });

            // Auto-scroll to bottom if user was already at bottom
            if (scrollToBottomAfter) {
                setTimeout(() => {
                    logContent.scrollTop = logContent.scrollHeight;
                }, 10);
            }

            // Update stats
            const currentLines = logContent.children.length;
            displayedLinesStats.textContent = `Showing: ${currentLines} lines (live mode)`;
        }

        // Display logs in the container
        function displayLogs(data, append = false) {
            const logs = data.logs || [];

            if (!append) {
                logContent.innerHTML = '';
                currentOffset = 0;
                shownLogs.clear(); // Clear shown logs tracking
                userScrolled = false;
                isAtBottom = true;
            }

            if (logs.length === 0) {
                if (!append) {
                    logContent.innerHTML = `
                        <div class="log-line">
                            <span class="log-level INFO">INFO</span>
                            <span class="log-message">No logs found matching current filters</span>
                        </div>
                    `;
                }
                return;
            }

            logs.forEach(log => {
                const logLine = document.createElement('div');
                logLine.className = 'log-line';

                logLine.innerHTML = `
                    <span class="log-timestamp">${escapeHtml(log.timestamp)}</span>
                    <span class="log-level ${log.level}">${log.level}</span>
                    <span class="log-module" style="color: rgba(255,255,255,0.6); font-size: 11px; min-width: 80px;">${escapeHtml(log.module || 'unknown')}</span>
                    <span class="log-message">${escapeHtml(log.message)}</span>
                `;

                logContent.appendChild(logLine);

                // Track this log as shown
                const logId = `${log.timestamp}|${log.message}`;
                shownLogs.add(logId);
            });

            // Show/hide load more button (not available in live mode)
            if (liveMode.checked) {
                loadMore.style.display = 'none';
            } else if (data.has_more) {
                loadMore.style.display = 'block';
                currentOffset = data.displayed_lines;
            } else {
                loadMore.style.display = 'none';
            }

            // Auto-scroll to bottom for initial load
            if (!append) {
                setTimeout(() => {
                    logContent.scrollTop = logContent.scrollHeight;
                }, 10);
            }
        }

        // Update statistics display
        function updateStats(data) {
            if (data.total_lines !== undefined) {
                totalLinesStats.textContent = `Total: ${data.total_lines || 0} lines`;
            }
            if (data.displayed_lines !== undefined) {
                displayedLinesStats.textContent = `Showing: ${data.displayed_lines || 0} lines`;
            }
        }

        // Update last updated timestamp
        function updateLastUpdated() {
            const now = new Date();
            lastUpdated.textContent = `Last updated: ${now.toLocaleTimeString()}`;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Debounce function for search input
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Toggle live mode
        function toggleLiveMode() {
            if (liveMode.checked) {
                // Load full history first so the user sees all lines, not just the last 50
                fetchLogs().then(() => {
                    displayedLinesStats.textContent = `Showing: ${logContent.children.length} lines (live mode)`;
                });
                // Start polling for new entries
                liveRefreshInterval = setInterval(fetchLiveLogs, 2000); // Poll every 2 seconds
                loadMore.style.display = 'none';

                // Disable auto-refresh when live mode is on
                if (autoRefresh.checked) {
                    autoRefresh.checked = false;
                    if (autoRefreshInterval) {
                        clearInterval(autoRefreshInterval);
                        autoRefreshInterval = null;
                    }
                }
            } else {
                // Stop live mode
                if (liveRefreshInterval) {
                    clearInterval(liveRefreshInterval);
                    liveRefreshInterval = null;
                }
                // Reload full logs
                fetchLogs();
            }
        }

        // Event listeners
        refreshBtn.addEventListener('click', () => {
            if (liveMode.checked) {
                fetchLiveLogs();
            } else {
                fetchLogs();
            }
        });

        logLevel.addEventListener('change', () => {
            if (liveMode.checked) {
                // In live mode, clear content and reset timestamp tracking for filter changes
                logContent.innerHTML = '<div class="loading"><div class="spinner"></div>Switching filter...</div>';
                lastLogTimestamp = null; // Reset timestamp so all matching logs will be shown
                setTimeout(() => {
                    fetchLiveLogs().then(() => {
                        // Ensure we show all matching logs by treating this as a forced refresh
                        if (logContent.innerHTML.includes('Switching filter')) {
                            // If still showing loading, it means no logs matched
                            logContent.innerHTML = `
                                <div class="log-line">
                                    <span class="log-level INFO">INFO</span>
                                    <span class="log-message">No logs found matching current filters</span>
                                </div>
                            `;
                        }
                    });
                }, 500);
            } else {
                fetchLogs();
            }
        });

        linesCount.addEventListener('change', () => {
            if (!liveMode.checked) {
                fetchLogs();
            }
        });

        searchInput.addEventListener('input', debounce(() => {
            if (liveMode.checked) {
                // In live mode, clear content and reset timestamp tracking for filter changes
                logContent.innerHTML = '<div class="loading"><div class="spinner"></div>Applying filter...</div>';
                lastLogTimestamp = null; // Reset timestamp so all matching logs will be shown
                setTimeout(() => {
                    fetchLiveLogs().then(() => {
                        // Ensure we show all matching logs by treating this as a forced refresh
                        if (logContent.innerHTML.includes('Applying filter')) {
                            // If still showing loading, it means no logs matched
                            logContent.innerHTML = `
                                <div class="log-line">
                                    <span class="log-level INFO">INFO</span>
                                    <span class="log-message">No logs found matching current filters</span>
                                </div>
                            `;
                        }
                    });
                }, 500);
            } else {
                fetchLogs();
            }
        }, 500));

        autoRefresh.addEventListener('change', (e) => {
            if (e.target.checked) {
                // Disable live mode if auto-refresh is enabled
                if (liveMode.checked) {
                    liveMode.checked = false;
                    toggleLiveMode();
                }
                autoRefreshInterval = setInterval(() => fetchLogs(), 30000);
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        });

        liveMode.addEventListener('change', toggleLiveMode);

        scrollToTop.addEventListener('click', () => {
            logContent.scrollTop = 0;
            userScrolled = true;
            isAtBottom = false;
        });

        scrollToBottom.addEventListener('click', () => {
            logContent.scrollTop = logContent.scrollHeight;
            userScrolled = false;
            isAtBottom = true;
        });

        loadMore.addEventListener('click', async () => {
            if (!liveMode.checked) {
                const data = await fetchLogs(currentOffset, true);
                if (data) {
                    currentOffset += data.displayed_lines;
                }
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch (e.key) {
                    case 'r':
                        e.preventDefault();
                        if (liveMode.checked) {
                            fetchLiveLogs();
                        } else {
                            fetchLogs();
                        }
                        break;
                    case 'f':
                        e.preventDefault();
                        searchInput.focus();
                        break;
                    case 'l':
                        e.preventDefault();
                        liveMode.checked = !liveMode.checked;
                        toggleLiveMode();
                        break;
                }
            }
        });

        // Initial load
        // Ensure form elements reflect correct initial state (prevent browser caching issues)
        logLevel.value = 'INFO';
        liveMode.checked = true;
        autoRefresh.checked = false;
        linesCount.value = '1000';
        searchInput.value = '';

        // Call toggleLiveMode() instead of fetchLiveLogs() directly so that:
        //   1. The polling interval is actually started (programmatic .checked = true
        //      does not fire the 'change' event, so the listener never ran)
        //   2. fetchLogs() is called first to populate the full history, not just 50 lines
        toggleLiveMode();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            if (liveRefreshInterval) {
                clearInterval(liveRefreshInterval);
            }
        });

        // ── Tab Switching ──
        const mainTabs = Array.from(document.querySelectorAll('.r-main-tab-btn'));
        const mainPanels = Array.from(document.querySelectorAll('.r-main-panel'));

        function setMainTab(tabName) {
            mainTabs.forEach(tab => {
                const active = tab.dataset.mainTab === tabName;
                tab.classList.toggle('active', active);
                tab.setAttribute('aria-selected', active ? 'true' : 'false');
            });
            mainPanels.forEach(panel => {
                panel.hidden = panel.dataset.mainPanel !== tabName;
            });
            if (tabName === 'hardcover' && !hcLoaded) {
                fetchHardcoverLogs();
            }
        }

        mainTabs.forEach(tab => {
            tab.addEventListener('click', () => setMainTab(tab.dataset.mainTab));
        });

        // ── Hardcover Sync Logs ──
        let hcPage = 1;
        let hcTotalPages = 1;
        let hcLoaded = false;
        const hcLogBody = document.getElementById('hcLogBody');
        const hcStatsLine = document.getElementById('hcStatsLine');
        const hcPageInfo = document.getElementById('hcPageInfo');
        const hcPrevBtn = document.getElementById('hcPrevBtn');
        const hcNextBtn = document.getElementById('hcNextBtn');

        function renderHcRow(log) {
            const tr = document.createElement('tr');

            const tdTs = document.createElement('td');
            tdTs.className = 'hc-ts';
            tdTs.textContent = log.created_at ? new Date(log.created_at).toLocaleString() : '';
            tr.appendChild(tdTs);

            const tdDir = document.createElement('td');
            const badge = document.createElement('span');
            badge.className = 'hc-direction-badge hc-dir-' + (log.direction || 'push');
            badge.textContent = log.direction || '';
            tdDir.appendChild(badge);
            tr.appendChild(tdDir);

            const tdAction = document.createElement('td');
            tdAction.textContent = (log.action || '').replace(/_/g, ' ');
            tr.appendChild(tdAction);

            const tdTitle = document.createElement('td');
            tdTitle.className = 'hc-title';
            tdTitle.textContent = log.book_title || '\u2014';
            tr.appendChild(tdTitle);

            const tdDetail = document.createElement('td');
            tdDetail.className = 'hc-detail';
            if (log.error_message) {
                tdDetail.textContent = log.error_message;
            } else if (log.detail && typeof log.detail === 'object') {
                tdDetail.textContent = Object.entries(log.detail)
                    .filter(([, v]) => v != null)
                    .map(([k, v]) => k + ': ' + v)
                    .join(', ');
            } else if (log.detail) {
                tdDetail.textContent = String(log.detail);
            }
            tr.appendChild(tdDetail);

            const tdStatus = document.createElement('td');
            const icon = document.createElement('span');
            icon.className = 'hc-status-icon ' + (log.success ? 'success' : 'failure');
            icon.title = log.success ? 'Success' : 'Failed';
            icon.textContent = log.success ? '\u2713' : '\u2717';
            tdStatus.appendChild(icon);
            tr.appendChild(tdStatus);

            return tr;
        }

        async function fetchHardcoverLogs() {
            const params = new URLSearchParams({ page: hcPage, per_page: 50 });
            const dir = document.getElementById('hcDirection').value;
            const act = document.getElementById('hcAction').value;
            const search = document.getElementById('hcSearch').value;
            if (dir) params.set('direction', dir);
            if (act) params.set('action', act);
            if (search) params.set('search', search);

            try {
                const res = await fetch('/api/logs/hardcover?' + params);
                const data = await res.json();
                hcLoaded = true;
                hcTotalPages = data.total_pages || 1;

                const showing = data.logs ? data.logs.length : 0;
                hcStatsLine.textContent = 'Showing ' + showing + ' of ' + (data.total || 0) + ' entries';
                hcPageInfo.textContent = 'Page ' + (data.page || 1) + ' of ' + hcTotalPages;
                hcPrevBtn.disabled = (data.page || 1) <= 1;
                hcNextBtn.disabled = (data.page || 1) >= hcTotalPages;

                hcLogBody.textContent = '';
                if (!data.logs || data.logs.length === 0) {
                    const emptyRow = document.createElement('tr');
                    const emptyTd = document.createElement('td');
                    emptyTd.colSpan = 6;
                    emptyTd.className = 'hc-empty';
                    emptyTd.textContent = 'No sync events recorded yet.';
                    emptyRow.appendChild(emptyTd);
                    hcLogBody.appendChild(emptyRow);
                    return;
                }

                data.logs.forEach(log => hcLogBody.appendChild(renderHcRow(log)));
            } catch (err) {
                hcLogBody.textContent = '';
                const errRow = document.createElement('tr');
                const errTd = document.createElement('td');
                errTd.colSpan = 6;
                errTd.className = 'hc-empty';
                errTd.textContent = 'Error loading logs: ' + err.message;
                errRow.appendChild(errTd);
                hcLogBody.appendChild(errRow);
            }
        }

        document.getElementById('hcRefreshBtn').addEventListener('click', () => { hcPage = 1; fetchHardcoverLogs(); });
        document.getElementById('hcDirection').addEventListener('change', () => { hcPage = 1; fetchHardcoverLogs(); });
        document.getElementById('hcAction').addEventListener('change', () => { hcPage = 1; fetchHardcoverLogs(); });
        document.getElementById('hcSearch').addEventListener('input', debounce(() => { hcPage = 1; fetchHardcoverLogs(); }, 500));
        hcPrevBtn.addEventListener('click', () => { if (hcPage > 1) { hcPage--; fetchHardcoverLogs(); } });
        hcNextBtn.addEventListener('click', () => { if (hcPage < hcTotalPages) { hcPage++; fetchHardcoverLogs(); } });
    </script>
</body>
