services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    user: root
    entrypoint: ["sh", "-c", "pip install -q pytest && python -m pytest tests/ \"$@\"", "--"]
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
